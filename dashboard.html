<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fernando — Dashboard de Peter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap');

  :root {
    --bg:       #0d0d0d;
    --surface:  #161616;
    --surface2: #1e1e1e;
    --border:   #252525;
    --text:     #f0f0f0;
    --muted:    #666;
    --ingreso:  #22c55e;
    --egreso:   #f43f5e;
    --personal: #818cf8;
    --negocio:  #38bdf8;
    --obra:     #fb923c;
    --accent:   #a78bfa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* ── Header ── */
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: var(--bg); z-index: 100;
  }
  .logo { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; }
  .logo span { color: var(--accent); }
  .header-actions { display: flex; gap: 8px; }
  .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; font-family: inherit; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-accent { background: var(--accent); color: #000; }
  .btn-surface { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger  { background: #f43f5e22; color: var(--egreso); border: 1px solid #f43f5e44; }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ── Filtros ── */
  .filtros { padding: 16px 32px; display: flex; gap: 8px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .filtros select, .filtros input {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text); padding: 8px 12px; border-radius: 8px;
    font-size: 13px; font-family: inherit;
  }

  /* ── Main ── */
  main { padding: 24px 32px; max-width: 1300px; margin: 0 auto; }

  /* ── Cards ── */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .card-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; }
  .card-value { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .card-value.ing { color: var(--ingreso); }
  .card-value.egr { color: var(--egreso); }
  .card-value.bal { color: var(--accent); }

  /* ── Grid 2 ── */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px 24px; }
  .panel-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 16px; }

  /* ── Barras entorno ── */
  .ebar { margin-bottom: 12px; }
  .ebar-header { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
  .ebar-track { height: 5px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .ebar-fill { height: 100%; border-radius: 99px; }

  /* ── Tabla ── */
  .tabla-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .tabla-header { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
  .tabla-header-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); padding: 10px 20px; border-bottom: 1px solid var(--border); }
  td { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; }
  .badge-Personal  { background: #818cf820; color: var(--personal); }
  .badge-Negocio   { background: #38bdf820; color: var(--negocio); }
  .badge-Obra      { background: #fb923c20; color: var(--obra); }
  .badge-INGRESO   { background: #22c55e20; color: var(--ingreso); }
  .badge-EGRESO    { background: #f43f5e20; color: var(--egreso); }
  .monto-INGRESO   { color: var(--ingreso); font-weight: 600; }
  .monto-EGRESO    { color: var(--egreso); font-weight: 600; }

  .td-acciones { display: flex; gap: 6px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: #00000088; z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 28px; width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title { font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 20px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; font-weight: 500; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; border-radius: 8px;
    font-size: 14px; font-family: inherit;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border);
    padding: 12px 18px; border-radius: 10px; font-size: 13px;
    z-index: 300; opacity: 0; transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* ── Confirm ── */
  .confirm-overlay {
    display: none; position: fixed; inset: 0;
    background: #00000088; z-index: 300;
    align-items: center; justify-content: center;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 24px; max-width: 360px; width: 100%;
    text-align: center;
  }
  .confirm-box p { margin-bottom: 20px; color: var(--muted); font-size: 14px; }
  .confirm-box strong { display: block; font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .confirm-actions { display: flex; gap: 8px; justify-content: center; }

  .loading { padding: 40px; text-align: center; color: var(--muted); font-size: 14px; }

  @media (max-width: 768px) {
    main, .filtros { padding: 16px; }
    header { padding: 16px; }
    .grid2 { grid-template-columns: 1fr; }
    th:nth-child(4), td:nth-child(4),
    th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Fernando <span>·</span> Peter</div>
  <div class="header-actions">
    <button class="btn btn-accent" onclick="abrirModal()">+ Nueva transacción</button>
  </div>
</header>

<div class="filtros">
  <select id="filMes" onchange="cargarDatos()">
    <option value="0">Este mes</option>
    <option value="1">Mes anterior</option>
    <option value="3">Últimos 3 meses</option>
    <option value="12">Este año</option>
    <option value="999">Todo</option>
  </select>
  <select id="filEntorno" onchange="cargarDatos()">
    <option value="">Todos los entornos</option>
    <option value="Personal">🏠 Personal</option>
    <option value="Negocio">💼 Negocio</option>
    <option value="Obra Majalca">🏗️ Obra Majalca</option>
  </select>
  <select id="filTipo" onchange="cargarDatos()">
    <option value="">Ingresos y egresos</option>
    <option value="INGRESO">💰 Solo ingresos</option>
    <option value="EGRESO">💸 Solo egresos</option>
  </select>
  <input type="text" id="filBuscar" placeholder="🔍 Buscar concepto..." oninput="filtrarLocal()" style="min-width:180px">
  <button class="btn btn-surface" onclick="cargarDatos()">↻ Actualizar</button>
</div>

<main>
  <!-- Cards resumen -->
  <div class="cards">
    <div class="card">
      <div class="card-label">Ingresos</div>
      <div class="card-value ing" id="cIngresos">$0</div>
    </div>
    <div class="card">
      <div class="card-label">Egresos</div>
      <div class="card-value egr" id="cEgresos">$0</div>
    </div>
    <div class="card">
      <div class="card-label">Balance</div>
      <div class="card-value bal" id="cBalance">$0</div>
    </div>
    <div class="card">
      <div class="card-label">Registros</div>
      <div class="card-value" id="cTotal">0</div>
    </div>
  </div>

  <!-- Gráficas -->
  <div class="grid2">
    <div class="panel">
      <div class="panel-title">Por entorno</div>
      <div id="entornoBars"><div class="loading">Cargando...</div></div>
    </div>
    <div class="panel">
      <div class="panel-title">Egresos por categoría</div>
      <canvas id="chartCat" height="200"></canvas>
    </div>
  </div>

  <!-- Tabla -->
  <div class="tabla-wrap">
    <div class="tabla-header">
      <div class="tabla-header-title">Transacciones</div>
    </div>
    <div id="tablaContainer"><div class="loading">Cargando...</div></div>
  </div>
</main>

<!-- Modal crear/editar -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModalSiOverlay(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Nueva transacción</div>
    <input type="hidden" id="editId">

    <div class="field">
      <label>Concepto *</label>
      <input type="text" id="fConcepto" placeholder="Ej: Compra de cemento">
    </div>
    <div class="field">
      <label>Monto *</label>
      <input type="number" id="fMonto" placeholder="0.00" min="0" step="0.01">
    </div>
    <div class="field">
      <label>Tipo *</label>
      <select id="fTipo">
        <option value="EGRESO">💸 Egreso</option>
        <option value="INGRESO">💰 Ingreso</option>
      </select>
    </div>
    <div class="field">
      <label>Entorno *</label>
      <select id="fEntorno" onchange="actualizarCategorias()">
        <option value="Personal">🏠 Personal</option>
        <option value="Negocio">💼 Negocio</option>
        <option value="Obra Majalca">🏗️ Obra Majalca</option>
      </select>
    </div>
    <div class="field">
      <label>Categoría *</label>
      <select id="fCategoria"></select>
    </div>
    <div class="field">
      <label>Fecha</label>
      <input type="datetime-local" id="fFecha">
    </div>
    <div class="field">
      <label>Notas</label>
      <textarea id="fNotas" placeholder="Opcional..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-surface" onclick="cerrarModal()">Cancelar</button>
      <button class="btn btn-accent" onclick="guardarTransaccion()">Guardar</button>
    </div>
  </div>
</div>

<!-- Confirm borrar -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <strong id="confirmTitle">¿Eliminar registro?</strong>
    <p id="confirmMsg">Esta acción no se puede deshacer.</p>
    <div class="confirm-actions">
      <button class="btn btn-surface" onclick="cerrarConfirm()">Cancelar</button>
      <button class="btn btn-danger" onclick="confirmarBorrar()">Sí, eliminar</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL  = "https://nhjonjuyzbqkkouobefq.supabase.co";
const ANON_KEY      = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5oam9uanV5emJxa2tvdW9iZWZxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1OTY2MjMsImV4cCI6MjA5NjE3MjYyM30.ULH3w2pUash9o10vHyvKg3grXEi_zMzYX3AQueE5Qxw";
const SERVICE_KEY   = ""; // Dejar vacío — el CRUD usa anon con RLS policy

const CATEGORIAS = {
  "Personal":     ["Alimentación","Transporte Personal","Salud","Ropa","Entretenimiento","Hogar","Educación","Imprevistos Personal"],
  "Negocio":      ["Servicios Digitales","Software","Marketing","Nómina","Oficina","Clientes","Proveedores","Impuestos","Imprevistos Negocio"],
  "Obra Majalca": ["Materiales","Mano de Obra","Maquinaria","Transporte","Herramientas","Servicios Obra","Imprevistos Obra"]
};

let todosLosDatos = [];
let chartInstance = null;
let borrarId      = null;

// ── API helpers ───────────────────────────────────────────────

async function api(method, path, body) {
  const headers = {
    "apikey":        ANON_KEY,
    "Authorization": `Bearer ${ANON_KEY}`,
    "Content-Type":  "application/json",
    "Prefer":        method === "POST" ? "return=representation" : ""
  };
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method, headers,
    body: body ? JSON.stringify(body) : undefined
  });
  if (!res.ok) {
    const err = await res.json();
    throw new Error(err.message || res.statusText);
  }
  return method === "DELETE" ? null : res.json();
}

// ── Formato ───────────────────────────────────────────────────

function fmt(n) {
  return parseFloat(n).toLocaleString("es-MX", { style: "currency", currency: "MXN" });
}

function fmtFecha(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleDateString("es-MX", {
    timeZone: "America/Chihuahua",
    day: "numeric", month: "short", year: "numeric",
    hour: "2-digit", minute: "2-digit"
  });
}

function fechaDesde(meses) {
  if (meses >= 999) return null;
  const d = new Date();
  if (meses === 0) { d.setDate(1); d.setHours(0,0,0,0); }
  else d.setMonth(d.getMonth() - meses);
  return d.toISOString();
}

// ── Cargar datos ──────────────────────────────────────────────

async function cargarDatos() {
  const meses   = parseInt(document.getElementById("filMes").value);
  const entorno = document.getElementById("filEntorno").value;
  const tipo    = document.getElementById("filTipo").value;

  let qs = "select=*&order=fecha_transaccion.desc";
  const desde = fechaDesde(meses);
  if (desde) qs += `&fecha_transaccion=gte.${desde}`;
  if (entorno) qs += `&entorno=eq.${encodeURIComponent(entorno)}`;
  if (tipo)    qs += `&tipo=eq.${tipo}`;

  try {
    todosLosDatos = await api("GET", `transacciones?${qs}`);
    renderTodo();
  } catch (err) {
    toast("❌ Error cargando datos: " + err.message, true);
  }
}

function filtrarLocal() {
  renderTodo();
}

function datosVisibles() {
  const q = document.getElementById("filBuscar").value.toLowerCase();
  if (!q) return todosLosDatos;
  return todosLosDatos.filter(r =>
    r.concepto?.toLowerCase().includes(q) ||
    r.categoria?.toLowerCase().includes(q)
  );
}

// ── Render ────────────────────────────────────────────────────

function renderTodo() {
  const data = datosVisibles();
  renderCards(data);
  renderBars(data);
  renderChart(data);
  renderTabla(data);
}

function renderCards(data) {
  const ing = data.filter(r => r.tipo === "INGRESO").reduce((s,r) => s + parseFloat(r.monto), 0);
  const egr = data.filter(r => r.tipo === "EGRESO").reduce((s,r)  => s + parseFloat(r.monto), 0);
  document.getElementById("cIngresos").textContent = fmt(ing);
  document.getElementById("cEgresos").textContent  = fmt(egr);
  document.getElementById("cTotal").textContent    = data.length;
  const bal = document.getElementById("cBalance");
  bal.textContent = fmt(ing - egr);
  bal.className = `card-value ${ing - egr >= 0 ? "ing" : "egr"}`;
}

function renderBars(data) {
  const entornos = [
    { k: "Personal",     c: "var(--personal)", e: "🏠" },
    { k: "Negocio",      c: "var(--negocio)",  e: "💼" },
    { k: "Obra Majalca", c: "var(--obra)",      e: "🏗️" }
  ];
  const totales = entornos.map(e => ({
    ...e,
    ing: data.filter(r => r.entorno === e.k && r.tipo === "INGRESO").reduce((s,r) => s + parseFloat(r.monto), 0),
    egr: data.filter(r => r.entorno === e.k && r.tipo === "EGRESO").reduce((s,r)  => s + parseFloat(r.monto), 0),
  }));
  const max = Math.max(...totales.map(e => e.ing + e.egr), 1);
  document.getElementById("entornoBars").innerHTML = totales.map(e => `
    <div class="ebar">
      <div class="ebar-header">
        <span>${e.e} ${e.k}</span>
        <span style="color:var(--muted);font-size:12px">${fmt(e.ing - e.egr)}</span>
      </div>
      <div class="ebar-track">
        <div class="ebar-fill" style="width:${((e.ing+e.egr)/max*100).toFixed(1)}%;background:${e.c}"></div>
      </div>
    </div>
  `).join("");
}

function renderChart(data) {
  const egr = data.filter(r => r.tipo === "EGRESO");
  const por = {};
  egr.forEach(r => { por[r.categoria] = (por[r.categoria] || 0) + parseFloat(r.monto); });
  const labels = Object.keys(por);
  const vals   = Object.values(por);
  const colors = ["#818cf8","#38bdf8","#fb923c","#22c55e","#f43f5e","#a78bfa","#fbbf24","#34d399","#f472b6","#60a5fa"];
  const ctx = document.getElementById("chartCat").getContext("2d");
  if (chartInstance) chartInstance.destroy();
  if (!labels.length) return;
  chartInstance = new Chart(ctx, {
    type: "doughnut",
    data: { labels, datasets: [{ data: vals, backgroundColor: colors.slice(0,labels.length), borderWidth: 0 }] },
    options: { plugins: { legend: { position: "bottom", labels: { color: "#666", font: { size: 11 }, padding: 10 } } }, cutout: "65%" }
  });
}

function renderTabla(data) {
  if (!data.length) {
    document.getElementById("tablaContainer").innerHTML = `<div class="loading">Sin registros en este período</div>`;
    return;
  }
  const entornoCss = e => e === "Personal" ? "Personal" : e === "Negocio" ? "Negocio" : "Obra";
  const rows = data.map(r => `
    <tr>
      <td style="color:var(--muted);font-size:11px">#${r.id}</td>
      <td>${r.concepto}</td>
      <td><span class="badge badge-${entornoCss(r.entorno)}">${r.entorno}</span></td>
      <td style="color:var(--muted);font-size:12px">${r.categoria}</td>
      <td><span class="badge badge-${r.tipo}">${r.tipo}</span></td>
      <td class="monto-${r.tipo}">${r.tipo === "INGRESO" ? "+" : "-"}${fmt(r.monto)}</td>
      <td style="color:var(--muted);font-size:12px">${fmtFecha(r.fecha_transaccion)}</td>
      <td>
        <div class="td-acciones">
          <button class="btn btn-surface btn-sm" onclick="abrirEditar(${r.id})">✏️</button>
          <button class="btn btn-danger btn-sm"  onclick="abrirConfirmBorrar(${r.id},'${r.concepto?.replace(/'/g,"\\'")}')">🗑️</button>
        </div>
      </td>
    </tr>
  `).join("");
  document.getElementById("tablaContainer").innerHTML = `
    <table>
      <thead><tr>
        <th>#</th><th>Concepto</th><th>Entorno</th><th>Categoría</th><th>Tipo</th><th>Monto</th><th>Fecha</th><th>Acciones</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

// ── Modal crear/editar ────────────────────────────────────────

function actualizarCategorias() {
  const entorno = document.getElementById("fEntorno").value;
  const cats    = CATEGORIAS[entorno] || [];
  const sel     = document.getElementById("fCategoria");
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join("");
}

function abrirModal(r = null) {
  document.getElementById("editId").value     = r?.id || "";
  document.getElementById("fConcepto").value  = r?.concepto || "";
  document.getElementById("fMonto").value     = r?.monto || "";
  document.getElementById("fTipo").value      = r?.tipo || "EGRESO";
  document.getElementById("fEntorno").value   = r?.entorno || "Personal";
  actualizarCategorias();
  document.getElementById("fCategoria").value = r?.categoria || "";
  document.getElementById("fNotas").value     = r?.transcripcion_original || "";

  if (r?.fecha_transaccion) {
    const d = new Date(r.fecha_transaccion);
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    document.getElementById("fFecha").value = d.toISOString().slice(0,16);
  } else {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById("fFecha").value = now.toISOString().slice(0,16);
  }

  document.getElementById("modalTitle").textContent = r ? `Editar #${r.id}` : "Nueva transacción";
  document.getElementById("modalOverlay").classList.add("open");
}

async function abrirEditar(id) {
  const r = todosLosDatos.find(x => x.id === id);
  if (r) abrirModal(r);
}

function cerrarModal() {
  document.getElementById("modalOverlay").classList.remove("open");
}

function cerrarModalSiOverlay(e) {
  if (e.target.id === "modalOverlay") cerrarModal();
}

async function guardarTransaccion() {
  const id       = document.getElementById("editId").value;
  const concepto = document.getElementById("fConcepto").value.trim();
  const monto    = parseFloat(document.getElementById("fMonto").value);
  const tipo     = document.getElementById("fTipo").value;
  const entorno  = document.getElementById("fEntorno").value;
  const categoria= document.getElementById("fCategoria").value;
  const fecha    = document.getElementById("fFecha").value;
  const notas    = document.getElementById("fNotas").value.trim();

  if (!concepto || !monto || !tipo || !entorno || !categoria) {
    toast("⚠️ Completa todos los campos requeridos");
    return;
  }

  const payload = {
    concepto, monto, tipo, entorno, categoria,
    fecha_transaccion: fecha ? new Date(fecha).toISOString() : new Date().toISOString(),
    transcripcion_original: notas || null,
    fuente: "dashboard"
  };

  try {
    if (id) {
      await api("PATCH", `transacciones?id=eq.${id}`, payload);
      toast("✅ Registro actualizado");
    } else {
      await api("POST", "transacciones", payload);
      toast("✅ Transacción guardada");
    }
    cerrarModal();
    cargarDatos();
  } catch (err) {
    toast("❌ Error: " + err.message, true);
  }
}

// ── Borrar ────────────────────────────────────────────────────

function abrirConfirmBorrar(id, concepto) {
  borrarId = id;
  document.getElementById("confirmTitle").textContent = `¿Eliminar #${id}?`;
  document.getElementById("confirmMsg").textContent   = concepto;
  document.getElementById("confirmOverlay").classList.add("open");
}

function cerrarConfirm() {
  borrarId = null;
  document.getElementById("confirmOverlay").classList.remove("open");
}

async function confirmarBorrar() {
  if (!borrarId) return;
  try {
    await api("DELETE", `transacciones?id=eq.${borrarId}`);
    toast("🗑️ Registro eliminado");
    cerrarConfirm();
    cargarDatos();
  } catch (err) {
    toast("❌ Error: " + err.message, true);
  }
}

// ── Toast ─────────────────────────────────────────────────────

function toast(msg, error = false) {
  const el = document.getElementById("toast");
  el.textContent  = msg;
  el.style.borderColor = error ? "#f43f5e44" : "#a78bfa44";
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

// ── Init ──────────────────────────────────────────────────────

actualizarCategorias();
cargarDatos();
setInterval(cargarDatos, 60000);
</script>
